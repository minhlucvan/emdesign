<script>
  // Workaround: hide the preparing overlay once storybook-root has content.
  // Storybook 8 sometimes doesn't dismiss the loading overlay when the story
  // renders synchronously before its mutation observer is set up.
  var observer = new MutationObserver(function() {
    var root = document.getElementById('storybook-root');
    var overlay = document.querySelector('.sb-preparing-story');
    if (root && root.children.length > 0 && overlay) {
      overlay.style.display = 'none';
      overlay.style.visibility = 'hidden';
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });
</script>
